name: 🚀 Deploy to Aliyun ECS

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 允许在 GitHub 页面手动触发部署

jobs:
  # ============================================================
  # Job 1: 代码质量检查（每次推送都跑）
  # ============================================================
  lint:
    name: 📋 Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff (fast linter)
        run: pip install ruff

      - name: Run linter
        run: |
          ruff check src/ main.py build_index.py --select=E,F,W --ignore=E501,W291,W293
          echo "✅ 代码质量检查通过"

  # ============================================================
  # Job 2: 部署到服务器（仅在 lint 通过后执行）
  # ============================================================
  deploy:
    name: 🚀 Deploy to Server
    runs-on: ubuntu-latest
    needs: lint  # 必须等 lint 通过才执行
    environment: production  # 关联 GitHub 环境配置（可选，用于审批）

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 📡 SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script_stop: true  # SSH 命令失败时立即停止
          script: |
            cd ~/antigravity
            chmod +x deploy.sh
            bash deploy.sh

      - name: ✅ Notify Success
        if: success()
        run: |
          echo "🎉 部署成功！"
          echo "Commit: ${{ github.sha }}"
          echo "By: ${{ github.actor }}"
          echo "Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

      - name: ❌ Notify Failure
        if: failure()
        run: |
          echo "💥 部署失败！请检查日志。"
          exit 1
